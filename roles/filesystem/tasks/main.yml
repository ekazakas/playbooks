---
- name: Install filesystem utilities
  become: true
  community.general.pacman:
    name: "{{ fs_packages }}"
    state: present
    update_cache: true

- name: Check if snapper config for root exists
  ansible.builtin.stat:
    path: /etc/snapper/configs/root
  register: snapper_config

- name: Create snapper root config
  become: true
  ansible.builtin.command: snapper -c root create-config /
  when: not snapper_config.stat.exists

- name: Ensure snapper services are enabled
  become: true
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    state: started
  loop: "{{ snapper_services }}"
