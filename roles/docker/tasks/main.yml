---
- name: Install docker binaries
  become: true
  community.general.pacman:
    name: "{{ docker_packages }}"
    state: present
    update_cache: true

- name: Add user to docker group
  become: true
  ansible.builtin.user:
    name: "{{ ansible_facts['user_id'] }}"
    groups: docker
    append: true

- name: Check if /var/lib/docker is on Btrfs
  set_fact:
    is_btrfs: "{{ is_btrfs | default(false) or item.fstype == 'btrfs' }}"
  loop: "{{ ansible_facts['mounts'] }}"
  when: item.mount in ['/', '/var/lib/docker']

- name: Configure Docker daemon (JSON)
  become: true
  ansible.builtin.copy:
    dest: /etc/docker/daemon.json
    content: |
      {
        "storage-driver": "{{ 'btrfs' if is_btrfs | default(false) else 'overlay2' }}"
      }
  notify: restart docker

- name: Enable and start Docker service
  become: true
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started
